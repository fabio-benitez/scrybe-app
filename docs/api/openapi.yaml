openapi: 3.0.3

info:
  title: Scrybe API
  version: 0.1.0
  description: API REST para la aplicación Scrybe.

servers:
  - url: http://localhost:8081/api/v1
    description: Entorno local


# =========================
# Paths
# =========================
paths:
  /health:
    get:
      summary: Comprueba el estado de la API
      tags:
        - Health
      responses:
        "200":
          description: API operativa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /health/db:
    get:
      summary: Comprueba la conexión con la base de datos
      tags:
        - Health
      responses:
        "200":
          description: Base de datos disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: "database connection ok"
        "503":
          description: Base de datos no disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: "database connection failed"

  /profile:
    get:
      summary: Obtiene el perfil del usuario autenticado
      tags:
        - Profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Perfil del usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: No autenticado
        "404":
          description: Perfil no encontrado

    patch:
      summary: Actualiza el perfil del usuario autenticado
      tags:
        - Profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Perfil actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: Datos inválidos
        "401":
          description: No autenticado
        "404":
          description: Perfil no encontrado

  /files:
    post:
      summary: Sube un archivo
      tags:
        - Files
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Archivo subido correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "400":
          description: Archivo inválido, vacío o MIME no permitido
        "401":
          description: No autenticado
        "409":
          description: Archivo duplicado
        "413":
          description: Archivo demasiado grande
        "500":
          description: Error interno

  /files/{file_id}:
    get:
      summary: Obtiene la metadata de un archivo
      tags:
        - Files
      security:
        - bearerAuth: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del archivo
      responses:
        "200":
          description: Metadata del archivo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "401":
          description: No autenticado
        "404":
          description: Archivo no encontrado
        "500":
          description: Error interno


# =========================
# Components
# =========================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # =========================
    # Health
    # =========================
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    # =========================
    # Profile
    # =========================
    UpdateProfileRequest:
      type: object
      required:
        - display_name
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 80
          example: fabio

    ProfileResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: f1c56607-3266-4a97-91cf-6a51f24a3946
        email:
          type: string
          format: email
          example: fabio@scrybe.com
        display_name:
          type: string
          example: fabio
        avatar_file_id:
          type: string
          format: uuid
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # =========================
    # Files
    # =========================
    FileResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        original_name:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        upload_status:
          type: string
          enum: [pending, uploaded, failed]
        created_at:
          type: string
          format: date-time
        uploaded_at:
          type: string
          format: date-time
          nullable: true