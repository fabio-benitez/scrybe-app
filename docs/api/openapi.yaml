openapi: 3.0.3

info:
  title: Scrybe API
  version: 0.1.0
  description: API REST para la aplicación Scrybe.

servers:
  - url: http://localhost:8081/api/v1
    description: Entorno local


# =========================
# Paths
# =========================
paths:
  /health:
    get:
      summary: Comprueba el estado de la API
      tags:
        - Health
      responses:
        "200":
          description: API operativa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /health/db:
    get:
      summary: Comprueba la conexión con la base de datos
      tags:
        - Health
      responses:
        "200":
          description: Base de datos disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: "database connection ok"
        "503":
          description: Base de datos no disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: "database connection failed"

  /profile:
    get:
      summary: Obtiene el perfil del usuario autenticado
      tags:
        - Profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Perfil del usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: No autenticado
        "404":
          description: Perfil no encontrado

    patch:
      summary: Actualiza el perfil del usuario autenticado
      tags:
        - Profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Perfil actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: Datos inválidos
        "401":
          description: No autenticado
        "404":
          description: Perfil no encontrado

  /profile/avatar:
    patch:
      summary: Establece el avatar del usuario autenticado
      tags:
        - Profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvatarRequest"
      responses:
        "200":
          description: Avatar actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: file_id vacío o UUID inválido
        "401":
          description: No autenticado
        "404":
          description: Archivo no encontrado o sin acceso
        "422":
          description: Archivo no listo o MIME no permitido
        "500":
          description: Error interno

    delete:
      summary: Elimina el avatar del usuario autenticado
      tags:
        - Profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Avatar eliminado, perfil devuelto con avatar_file_id null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: No autenticado
        "404":
          description: Perfil no encontrado
        "500":
          description: Error interno

  /files:
    post:
      summary: Sube un archivo
      tags:
        - Files
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Archivo subido correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "400":
          description: Archivo inválido, vacío o MIME no permitido
        "401":
          description: No autenticado
        "409":
          description: Archivo duplicado
        "413":
          description: Archivo demasiado grande
        "500":
          description: Error interno

  /files/{file_id}:
    get:
      summary: Obtiene la metadata de un archivo
      tags:
        - Files
      security:
        - bearerAuth: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del archivo
      responses:
        "200":
          description: Metadata del archivo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "401":
          description: No autenticado
        "404":
          description: Archivo no encontrado
        "500":
          description: Error interno

    delete:
      summary: Elimina un archivo del usuario autenticado
      tags:
        - Files
      security:
        - bearerAuth: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del archivo
      responses:
        "204":
          description: Archivo eliminado correctamente
        "401":
          description: No autenticado
        "404":
          description: Archivo no encontrado
        "500":
          description: Error interno

  /files/{file_id}/url:
    get:
      summary: Genera una URL firmada temporal para acceder al archivo
      tags:
        - Files
      security:
        - bearerAuth: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del archivo
      responses:
        "200":
          description: URL firmada generada correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileURLResponse"
        "401":
          description: No autenticado
        "404":
          description: Archivo no encontrado o no disponible
        "500":
          description: Error interno al generar la URL

  /tags:
    get:
      summary: Lista todos los tags del usuario autenticado
      tags:
        - Tags
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de tags (vacía si no hay ninguno)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TagResponse"
        "401":
          description: No autenticado
        "500":
          description: Error interno

    post:
      summary: Crea un nuevo tag
      tags:
        - Tags
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: Tag creado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResponse"
        "400":
          description: Datos inválidos
        "401":
          description: No autenticado
        "409":
          description: Ya existe un tag con ese nombre
        "500":
          description: Error interno


  /tags/{tag_id}:
    get:
      summary: Obtiene un tag por ID
      tags:
        - Tags
      security:
        - bearerAuth: []
      parameters:
        - name: tag_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del tag
      responses:
        "200":
          description: Tag encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResponse"
        "401":
          description: No autenticado
        "404":
          description: Tag no encontrado
        "500":
          description: Error interno

    patch:
      summary: Actualiza parcialmente un tag
      tags:
        - Tags
      security:
        - bearerAuth: []
      parameters:
        - name: tag_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTagRequest"
      responses:
        "200":
          description: Tag actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagResponse"
        "400":
          description: Datos inválidos
        "401":
          description: No autenticado
        "404":
          description: Tag no encontrado
        "409":
          description: Ya existe un tag con ese nombre
        "500":
          description: Error interno

    delete:
      summary: Elimina un tag
      tags:
        - Tags
      security:
        - bearerAuth: []
      parameters:
        - name: tag_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del tag
      responses:
        "204":
          description: Tag eliminado
        "401":
          description: No autenticado
        "404":
          description: Tag no encontrado
        "500":
          description: Error interno


  /categories:
    get:
      summary: Lista todas las categorías del usuario autenticado
      tags:
        - Categories
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de categorías (vacía si no hay ninguna)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryResponse"
        "401":
          description: No autenticado
        "500":
          description: Error interno

    post:
      summary: Crea una nueva categoría
      tags:
        - Categories
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Categoría creada correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "400":
          description: Datos inválidos
        "401":
          description: No autenticado
        "409":
          description: Ya existe una categoría con ese nombre
        "500":
          description: Error interno


  /categories/{category_id}:
    get:
      summary: Obtiene una categoría por ID
      tags:
        - Categories
      security:
        - bearerAuth: []
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la categoría
      responses:
        "200":
          description: Categoría encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "401":
          description: No autenticado
        "404":
          description: Categoría no encontrada
        "500":
          description: Error interno

    patch:
      summary: Actualiza parcialmente una categoría
      tags:
        - Categories
      security:
        - bearerAuth: []
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la categoría
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Categoría actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryResponse"
        "400":
          description: Datos inválidos
        "401":
          description: No autenticado
        "404":
          description: Categoría no encontrada
        "409":
          description: Ya existe una categoría con ese nombre
        "500":
          description: Error interno

    delete:
      summary: Elimina una categoría
      tags:
        - Categories
      security:
        - bearerAuth: []
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la categoría
      responses:
        "204":
          description: Categoría eliminada
        "401":
          description: No autenticado
        "404":
          description: Categoría no encontrada
        "500":
          description: Error interno


  /contents:
    get:
      summary: Lista todos los contenidos del usuario autenticado
      tags:
        - Contents
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de contenidos (vacía si no hay ninguno)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentResponse"
        "401":
          description: No autenticado
        "500":
          description: Error interno

    post:
      summary: Crea un nuevo contenido
      tags:
        - Contents
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContentRequest"
      responses:
        "201":
          description: Contenido creado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentResponse"
        "400":
          description: Datos inválidos (título, content, status, visibility o category_id)
        "401":
          description: No autenticado
        "404":
          description: Categoría no encontrada o no pertenece al usuario
        "409":
          description: Ya existe un contenido con ese slug
        "500":
          description: Error interno

  /contents/{content_id}:
    get:
      summary: Obtiene un contenido por ID
      tags:
        - Contents
      security:
        - bearerAuth: []
      parameters:
        - name: content_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del contenido
      responses:
        "200":
          description: Contenido encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentResponse"
        "401":
          description: No autenticado
        "404":
          description: Contenido no encontrado
        "500":
          description: Error interno

    patch:
      summary: Actualiza parcialmente un contenido
      tags:
        - Contents
      security:
        - bearerAuth: []
      parameters:
        - name: content_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del contenido
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContentRequest"
      responses:
        "200":
          description: Contenido actualizado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentResponse"
        "400":
          description: Datos inválidos (título vacío, content no-objeto, status/visibility inválido, category_id mal formado)
        "401":
          description: No autenticado
        "404":
          description: Contenido o categoría no encontrados
        "409":
          description: Ya existe un contenido con ese slug
        "500":
          description: Error interno

    delete:
      summary: Elimina un contenido
      tags:
        - Contents
      security:
        - bearerAuth: []
      parameters:
        - name: content_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del contenido
      responses:
        "204":
          description: Contenido eliminado correctamente
        "401":
          description: No autenticado
        "404":
          description: Contenido no encontrado
        "500":
          description: Error interno


# =========================
# Components
# =========================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # =========================
    # Health
    # =========================
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    # =========================
    # Profile
    # =========================
    UpdateProfileRequest:
      type: object
      required:
        - display_name
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 80
          example: fabio

    UpdateAvatarRequest:
      type: object
      required:
        - file_id
      properties:
        file_id:
          type: string
          format: uuid
          example: a3f2c1d0-0000-4000-8000-000000000001

    ProfileResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: f1c56607-3266-4a97-91cf-6a51f24a3946
        email:
          type: string
          format: email
          example: fabio@scrybe.com
        display_name:
          type: string
          example: fabio
        avatar_file_id:
          type: string
          format: uuid
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time


    # =========================
    # Files
    # =========================
    FileResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        original_name:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        upload_status:
          type: string
          enum: [pending, uploaded, failed]
        created_at:
          type: string
          format: date-time
        uploaded_at:
          type: string
          format: date-time
          nullable: true

    FileURLResponse:
      type: object
      properties:
        url:
          type: string
          format: uri
          example: "https://example.supabase.co/storage/v1/object/sign/files/user-id/file-name.png?token=..."

    # =========================
    # Categories
    # =========================
    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
          example: Work
        description:
          type: string
          maxLength: 500
          example: Notas de trabajo
        color:
          type: string
          enum: [gray, red, orange, yellow, green, blue, purple, pink]
          default: gray
          example: blue

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
          example: Work updated
        description:
          type: string
          maxLength: 500
          nullable: true
          description: |
            Omitido o null → sin cambio.
            "" → se guarda como NULL.
          example: Nueva descripción
        color:
          type: string
          enum: [gray, red, orange, yellow, green, blue, purple, pink]
          description: |
            Omitido → sin cambio.
            "" → se convierte en "gray".
          example: purple

    CategoryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-0000-4000-8000-000000000001
        name:
          type: string
          example: Work
        slug:
          type: string
          example: work
        description:
          type: string
          nullable: true
          example: Notas de trabajo
        color:
          type: string
          enum: [gray, red, orange, yellow, green, blue, purple, pink]
          example: blue
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # =========================
    # Tags
    # =========================
    CreateTagRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          example: golang

    UpdateTagRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: |
            Omitido → sin cambio (devuelve el tag actual).
            Si se envía → trim, requerido, máx. 50 chars, slug regenerado.
          example: rust

    TagResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: b2c3d4e5-0000-4000-8000-000000000002
        name:
          type: string
          example: golang
        slug:
          type: string
          example: golang
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # =========================
    # Contents
    # =========================
    CreateContentRequest:
      type: object
      required:
        - title
        - content
      properties:
        category_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Omitido o null → sin categoría.
            UUID inválido → 400.
            Categoría inexistente o de otro usuario → 404.
          example: null
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: Mi primer contenido
        summary:
          type: string
          maxLength: 500
          description: Omitido o "" → se guarda como NULL.
          example: Un resumen breve del contenido.
        content:
          type: object
          description: Documento JSON del editor (TipTap/ProseMirror). Debe ser un objeto JSON.
          example: {"type": "doc", "content": []}
        status:
          type: string
          enum: [draft, published, archived]
          default: draft
          description: Omitido → draft.
          example: draft
        visibility:
          type: string
          enum: [private, public]
          default: private
          description: Omitido → private.
          example: private
        is_favorite:
          type: boolean
          default: false
          example: false

    UpdateContentRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Omitido → sin cambio. "" o solo espacios → 400.
          example: Título actualizado
        summary:
          type: string
          maxLength: 500
          nullable: true
          description: |
            Omitido o null → sin cambio.
            "" → se guarda como NULL.
          example: Nuevo resumen.
        content:
          type: object
          nullable: true
          description: |
            Omitido → sin cambio.
            null, array, string → 400.
            Debe ser un objeto JSON.
          example: {"type": "doc", "content": []}
        category_id:
          nullable: true
          description: |
            Omitido → sin cambio.
            null → desasociar categoría.
            string UUID → asignar categoría.
            UUID inválido → 400.
            Categoría inexistente o de otro usuario → 404.
          example: null
        status:
          type: string
          enum: [draft, published, archived]
          description: |
            Omitido → sin cambio.
            published → published_at se establece si era null (idempotente).
            draft/archived → published_at se mantiene como historial.
          example: published
        visibility:
          type: string
          enum: [private, public]
          description: Omitido → sin cambio.
          example: public
        is_favorite:
          type: boolean
          description: Omitido → sin cambio. false explícito actualiza correctamente.
          example: true

    ContentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: c1d2e3f4-0000-4000-8000-000000000003
        category_id:
          type: string
          format: uuid
          nullable: true
          example: null
        title:
          type: string
          example: Mi primer contenido
        slug:
          type: string
          nullable: true
          example: mi-primer-contenido
        summary:
          type: string
          nullable: true
          example: Un resumen breve del contenido.
        content:
          type: object
          description: Documento JSON del editor.
          example: {"type": "doc", "content": []}
        status:
          type: string
          enum: [draft, published, archived]
          example: draft
        visibility:
          type: string
          enum: [private, public]
          example: private
        is_favorite:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time
          nullable: true
          example: null