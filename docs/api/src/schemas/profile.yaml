UpdateProfileRequest:
  type: object
  required:
    - display_name
  properties:
    display_name:
      type: string
      minLength: 1
      maxLength: 80
      example: fabio

UpdateAvatarRequest:
  type: object
  required:
    - file_id
  properties:
    file_id:
      $ref: "./common.yaml#/UUID"

ProfileResponse:
  type: object
  properties:
    id:
      $ref: "./common.yaml#/UUID"
    email:
      type: string
      format: email
      example: fabio@scrybe.com
    display_name:
      type: string
      example: fabio
    avatar_file_id:
      allOf:
        - $ref: "./common.yaml#/UUID"
      nullable: true
      example: null
    created_at:
      $ref: "./common.yaml#/DateTime"
    updated_at:
      $ref: "./common.yaml#/DateTime"