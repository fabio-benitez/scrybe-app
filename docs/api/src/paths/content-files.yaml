content-files:
  get:
    summary: Lista los archivos asociados a un contenido
    description: |
      Devuelve los archivos asociados al contenido ordenados por position ASC, created_at ASC.
      Si el contenido no tiene archivos → devuelve [].
    tags:
      - Content Files
    security:
      - bearerAuth: []
    parameters:
      - name: content_id
        in: path
        required: true
        schema:
          $ref: "../schemas/common.yaml#/UUID"
        description: ID del contenido
    responses:
      "200":
        description: Lista de archivos del contenido (vacía si no tiene ninguno)
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/content-files.yaml#/ContentFileResponse"
      "401":
        description: No autenticado
      "404":
        description: Contenido no encontrado o no pertenece al usuario
      "500":
        description: Error interno

  put:
    summary: Reemplaza completamente los archivos asociados a un contenido
    description: |
      Reemplaza de forma atómica todos los archivos del contenido con la lista proporcionada.
      - `file_ids: []` → elimina todos los archivos del contenido.
      - `file_ids: null` o campo ausente → 400.
      - IDs duplicados en la lista se ignoran (deduplicación interna).
      - Solo se aceptan archivos con upload_status = 'uploaded'; pending/failed → 404.
      - La posición se asigna automáticamente según el orden del array (0-based).
      - Devuelve la lista final de archivos ordenada por position ASC, created_at ASC.
    tags:
      - Content Files
    security:
      - bearerAuth: []
    parameters:
      - name: content_id
        in: path
        required: true
        schema:
          $ref: "../schemas/common.yaml#/UUID"
        description: ID del contenido
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/content-files.yaml#/SetContentFilesRequest"
    responses:
      "200":
        description: Lista final de archivos asociados al contenido (vacía si file_ids era [])
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/content-files.yaml#/ContentFileResponse"
      "400":
        description: file_ids ausente, null, o contiene un UUID con formato inválido
      "401":
        description: No autenticado
      "404":
        description: Recurso no encontrado (contenido o archivo)
      "500":
        description: Error interno