content-tags:
  get:
    summary: Lista los tags asociados a un contenido
    description: |
      Devuelve los tags asociados al contenido ordenados por nombre (LOWER ASC).
      Si el contenido no tiene tags → devuelve [].
    tags:
      - Content Tags
    security:
      - bearerAuth: []
    parameters:
      - name: content_id
        in: path
        required: true
        schema:
          $ref: "../schemas/common.yaml#/UUID"
        description: ID del contenido
    responses:
      "200":
        description: Lista de tags del contenido (vacía si no tiene ninguno)
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/tags.yaml#/TagResponse"
      "401":
        description: No autenticado
      "404":
        description: Contenido no encontrado o no pertenece al usuario
      "500":
        description: Error interno

  put:
    summary: Reemplaza completamente los tags asociados a un contenido
    description: |
      Reemplaza de forma atómica todos los tags del contenido con la lista proporcionada.
      - `tag_ids: []` → elimina todos los tags del contenido.
      - `tag_ids: null` o campo ausente → 400.
      - IDs duplicados en la lista se ignoran (deduplicación interna).
      - Devuelve la lista final de tags ordenada por nombre (LOWER ASC).
    tags:
      - Content Tags
    security:
      - bearerAuth: []
    parameters:
      - name: content_id
        in: path
        required: true
        schema:
          $ref: "../schemas/common.yaml#/UUID"
        description: ID del contenido
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/content-tags.yaml#/SetContentTagsRequest"
    responses:
      "200":
        description: Lista final de tags asociados al contenido (vacía si tag_ids era [])
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/tags.yaml#/TagResponse"
      "400":
        description: tag_ids ausente, null, o contiene un UUID con formato inválido
      "401":
        description: No autenticado
      "404":
        description: Recurso no encontrado (contenido o tag)
      "500":
        description: Error interno