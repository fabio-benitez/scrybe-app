categories:
  get:
    summary: Lista todas las categorías del usuario autenticado
    tags:
      - Categories
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Lista de categorías (vacía si no hay ninguna)
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/categories.yaml#/CategoryResponse"
      "401":
        description: No autenticado
      "500":
        description: Error interno

  post:
    summary: Crea una nueva categoría
    tags:
      - Categories
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/categories.yaml#/CreateCategoryRequest"
    responses:
      "201":
        description: Categoría creada correctamente
        content:
          application/json:
            schema:
              $ref: "../schemas/categories.yaml#/CategoryResponse"
      "400":
        description: Datos inválidos
      "401":
        description: No autenticado
      "409":
        description: Ya existe una categoría con ese nombre
      "500":
        description: Error interno

category-by-id:
  get:
    summary: Obtiene una categoría por ID
    tags:
      - Categories
    security:
      - bearerAuth: []
    parameters:
      - name: category_id
        in: path
        required: true
        schema:
          $ref: "../schemas/common.yaml#/UUID"
        description: ID de la categoría
    responses:
      "200":
        description: Categoría encontrada
        content:
          application/json:
            schema:
              $ref: "../schemas/categories.yaml#/CategoryResponse"
      "401":
        description: No autenticado
      "404":
        description: Categoría no encontrada
      "500":
        description: Error interno

  patch:
    summary: Actualiza parcialmente una categoría
    tags:
      - Categories
    security:
      - bearerAuth: []
    parameters:
      - name: category_id
        in: path
        required: true
        schema:
          $ref: "../schemas/common.yaml#/UUID"
        description: ID de la categoría
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/categories.yaml#/UpdateCategoryRequest"
    responses:
      "200":
        description: Categoría actualizada
        content:
          application/json:
            schema:
              $ref: "../schemas/categories.yaml#/CategoryResponse"
      "400":
        description: Datos inválidos
      "401":
        description: No autenticado
      "404":
        description: Categoría no encontrada
      "409":
        description: Ya existe una categoría con ese nombre
      "500":
        description: Error interno

  delete:
    summary: Elimina una categoría
    tags:
      - Categories
    security:
      - bearerAuth: []
    parameters:
      - name: category_id
        in: path
        required: true
        schema:
          $ref: "../schemas/common.yaml#/UUID"
        description: ID de la categoría
    responses:
      "204":
        description: Categoría eliminada
      "401":
        description: No autenticado
      "404":
        description: Categoría no encontrada
      "500":
        description: Error interno