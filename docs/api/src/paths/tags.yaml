tags:
  get:
    summary: Lista todos los tags del usuario autenticado
    tags:
      - Tags
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Lista de tags (vacía si no hay ninguno)
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/tags.yaml#/TagResponse"
      "401":
        description: No autenticado
      "500":
        description: Error interno

  post:
    summary: Crea un nuevo tag
    tags:
      - Tags
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/tags.yaml#/CreateTagRequest"
    responses:
      "201":
        description: Tag creado correctamente
        content:
          application/json:
            schema:
              $ref: "../schemas/tags.yaml#/TagResponse"
      "400":
        description: Datos inválidos
      "401":
        description: No autenticado
      "409":
        description: Ya existe un tag con ese nombre
      "500":
        description: Error interno

tag-by-id:
  get:
    summary: Obtiene un tag por ID
    tags:
      - Tags
    security:
      - bearerAuth: []
    parameters:
      - name: tag_id
        in: path
        required: true
        schema:
          $ref: "../schemas/common.yaml#/UUID"
        description: ID del tag
    responses:
      "200":
        description: Tag encontrado
        content:
          application/json:
            schema:
              $ref: "../schemas/tags.yaml#/TagResponse"
      "401":
        description: No autenticado
      "404":
        description: Tag no encontrado
      "500":
        description: Error interno

  patch:
    summary: Actualiza parcialmente un tag
    tags:
      - Tags
    security:
      - bearerAuth: []
    parameters:
      - name: tag_id
        in: path
        required: true
        schema:
          $ref: "../schemas/common.yaml#/UUID"
        description: ID del tag
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/tags.yaml#/UpdateTagRequest"
    responses:
      "200":
        description: Tag actualizado
        content:
          application/json:
            schema:
              $ref: "../schemas/tags.yaml#/TagResponse"
      "400":
        description: Datos inválidos
      "401":
        description: No autenticado
      "404":
        description: Tag no encontrado
      "409":
        description: Ya existe un tag con ese nombre
      "500":
        description: Error interno

  delete:
    summary: Elimina un tag
    tags:
      - Tags
    security:
      - bearerAuth: []
    parameters:
      - name: tag_id
        in: path
        required: true
        schema:
          $ref: "../schemas/common.yaml#/UUID"
        description: ID del tag
    responses:
      "204":
        description: Tag eliminado
      "401":
        description: No autenticado
      "404":
        description: Tag no encontrado
      "500":
        description: Error interno