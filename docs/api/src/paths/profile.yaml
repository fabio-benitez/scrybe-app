profile:
  get:
    summary: Obtiene el perfil del usuario autenticado
    tags:
      - Profile
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Perfil del usuario autenticado
        content:
          application/json:
            schema:
              $ref: "../schemas/profile.yaml#/ProfileResponse"
      "401":
        description: No autenticado
      "404":
        description: Perfil no encontrado

  patch:
    summary: Actualiza el perfil del usuario autenticado
    tags:
      - Profile
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/profile.yaml#/UpdateProfileRequest"
    responses:
      "200":
        description: Perfil actualizado
        content:
          application/json:
            schema:
              $ref: "../schemas/profile.yaml#/ProfileResponse"
      "400":
        description: Datos inválidos
      "401":
        description: No autenticado
      "404":
        description: Perfil no encontrado

profile-avatar:
  patch:
    summary: Establece el avatar del usuario autenticado
    tags:
      - Profile
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/profile.yaml#/UpdateAvatarRequest"
    responses:
      "200":
        description: Avatar actualizado
        content:
          application/json:
            schema:
              $ref: "../schemas/profile.yaml#/ProfileResponse"
      "400":
        description: file_id vacío o UUID inválido
      "401":
        description: No autenticado
      "404":
        description: Archivo no encontrado o sin acceso
      "422":
        description: Archivo no listo o MIME no permitido
      "500":
        description: Error interno

  delete:
    summary: Elimina el avatar del usuario autenticado
    tags:
      - Profile
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Avatar eliminado, perfil devuelto con avatar_file_id null
        content:
          application/json:
            schema:
              $ref: "../schemas/profile.yaml#/ProfileResponse"
      "401":
        description: No autenticado
      "404":
        description: Perfil no encontrado
      "500":
        description: Error interno