contents:
  get:
    summary: Lista todos los contenidos del usuario autenticado
    tags:
      - Contents
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Lista de contenidos (vacía si no hay ninguno)
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/contents.yaml#/ContentResponse"
      "401":
        description: No autenticado
      "500":
        description: Error interno

  post:
    summary: Crea un nuevo contenido
    tags:
      - Contents
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/contents.yaml#/CreateContentRequest"
    responses:
      "201":
        description: Contenido creado correctamente
        content:
          application/json:
            schema:
              $ref: "../schemas/contents.yaml#/ContentResponse"
      "400":
        description: Datos inválidos (título, content, status, visibility o category_id)
      "401":
        description: No autenticado
      "404":
        description: Categoría no encontrada o no pertenece al usuario
      "409":
        description: Ya existe un contenido con ese slug
      "500":
        description: Error interno

content-by-id:
  get:
    summary: Obtiene un contenido por ID
    tags:
      - Contents
    security:
      - bearerAuth: []
    parameters:
      - name: content_id
        in: path
        required: true
        schema:
          $ref: "../schemas/common.yaml#/UUID"
        description: ID del contenido
    responses:
      "200":
        description: Contenido encontrado
        content:
          application/json:
            schema:
              $ref: "../schemas/contents.yaml#/ContentResponse"
      "401":
        description: No autenticado
      "404":
        description: Contenido no encontrado
      "500":
        description: Error interno

  patch:
    summary: Actualiza parcialmente un contenido
    tags:
      - Contents
    security:
      - bearerAuth: []
    parameters:
      - name: content_id
        in: path
        required: true
        schema:
          $ref: "../schemas/common.yaml#/UUID"
        description: ID del contenido
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/contents.yaml#/UpdateContentRequest"
    responses:
      "200":
        description: Contenido actualizado correctamente
        content:
          application/json:
            schema:
              $ref: "../schemas/contents.yaml#/ContentResponse"
      "400":
        description: Datos inválidos (título vacío, content no-objeto, status/visibility inválido, category_id mal formado)
      "401":
        description: No autenticado
      "404":
        description: Contenido o categoría no encontrados
      "409":
        description: Ya existe un contenido con ese slug
      "500":
        description: Error interno

  delete:
    summary: Elimina un contenido
    tags:
      - Contents
    security:
      - bearerAuth: []
    parameters:
      - name: content_id
        in: path
        required: true
        schema:
          $ref: "../schemas/common.yaml#/UUID"
        description: ID del contenido
    responses:
      "204":
        description: Contenido eliminado correctamente
      "401":
        description: No autenticado
      "404":
        description: Contenido no encontrado
      "500":
        description: Error interno